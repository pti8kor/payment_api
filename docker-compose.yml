services:
  payments-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: http://rb-proxy-unix-apac.bosch.com:8080
        HTTPS_PROXY: http://rb-proxy-unix-apac.bosch.com:8080
        NO_PROXY: localhost,127.0.0.1
    container_name: payments-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
